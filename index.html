<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComicDrop</title>

    <link
      rel="preload"
      href="/assets/grid-long.jpg"
      crossorigin="anonymous"
      as="image"
      type="image/jpeg"
    />

    <link rel="icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div
        id="systemControls"
        class="top-control-capsule"
        style="display: none"
      >
        <button id="hideOverlayBtn" title="Hide Controls">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
            ></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          Hide UI
        </button>
        <div class="capsule-divider"></div>
        <button id="fullscreenBtn" title="Toggle Fullscreen">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
            ></path>
          </svg>
          Fullscreen
        </button>
      </div>

      <section class="top-heading">
        <span class="drop-icon">
          <img
            src="assets/icon.svg"
            alt="ComicDrop Icon"
            width="64"
            height="64"
          />
        </span>
        <h1>ComicDrop</h1>
        <p class="tagline">
          A lightning-fast, private web reader for your digital comic books
        </p>
      </section>

      <div id="dropZone" class="drop-zone">
        <div class="drop-action-area">
          <p>Drop your CBR, CBZ, or CB7 archives right here to start reading</p>
          <div class="separator">or</div>
          <label for="fileInput" class="file-label">Choose a file</label>
          <input 
            type="file" 
            id="fileInput" 
            accept=".cbz,.cbr,.cb7,.zip,.rar,.7z,application/zip,application/x-zip-compressed,application/x-cbz,application/x-cbr,application/octet-stream" 
            style="display: none;" 
          />
        </div>
      </div>

      <div
        id="progressContainer"
        class="progress-container"
        style="display: none"
      >
        <div id="progressBar" class="progress-bar"></div>
        <span id="progressText"></span>
      </div>

      <div id="readerContainer" class="reader-container" style="display: none">
        <div id="navControls" class="nav-controls"></div>

        <div id="comicPage" class="comic-page">
          <img
            id="pageCanvasA"
            class="canvas-layer active"
            src=""
            alt="Comic Page"
          />
          <img
            id="pageCanvasB"
            class="canvas-layer hidden"
            src=""
            alt="Comic Page"
          />
        </div>

        <div id="zoomIndicator" class="zoom-indicator"></div>
      </div>

      <noscript
        ><div class="error-container">
          JavaScript is required to use this app.
        </div></noscript
      >
      <div id="jszipMissing" class="error-container" style="display: none">
        JSZip library not loaded. Please add <code>jszip.min.js</code> to
        <code>lib/</code> folder.
      </div>
    </main>

    <div
      id="errorContainer"
      class="error-container"
      style="display: none"
    ></div>

    <script src="lib/unarchiver.min.js"></script>
    <script src="lib/jszip.min.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/fileHandler.js" defer></script>
    <script src="js/reader.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
